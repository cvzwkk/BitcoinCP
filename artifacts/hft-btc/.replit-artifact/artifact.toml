kind = "web"
previewPath = "/"
title = "BTC HFT Predictor"
version = "1.0.0"
id = "artifacts/hft-btc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25268

[services.development]
run = "pnpm --filter @workspace/hft-btc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hft-btc", "run", "build" ]
publicDir = "artifacts/hft-btc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25268"
BASE_PATH = "/"
